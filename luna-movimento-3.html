  { name:"Mestruale",   color:"#e07b8a", bg:"#fdf0f2", emoji:"🌑", description:"Energia bassa, il corpo si riposa",       science:"Durante le mestruazioni i livelli di estrogeni e progesterone sono al minimo assoluto. L'utero contrae i suoi muscoli per espellere l'endometrio — ed è proprio questo a causare i crampi. Il flusso sanguigno verso l'utero aumenta, mentre quello verso i muscoli delle gambe può diminuire, contribuendo alla sensazione di pesantezza.\n\nIl cervello è in modalità 'reset': la caduta ormonale può influenzare serotonina e dopamina, spiegando sbalzi d'umore, voglia di stare al caldo e di isolarsi. È una fase di rigenerazione, non di debolezza.", tips:"💡 Consigli pratici:\n• Privilegia movimenti lenti e consapevoli — yoga, stretching, camminate tranquille\n• Scalda la zona addominale con una borsa dell'acqua calda\n• Mangia cibi ricchi di ferro (legumi, verdure a foglia scura) per compensare le perdite\n• Concediti più sonno del solito — il corpo lo chiede per un motivo", defaultWorkouts:["Stretching leggero","Yoga dolce","Camminata"] },
  { name:"Follicolare", color:"#f4a261", bg:"#fff8f0", emoji:"🌒", description:"Energia in salita, ottimo per cardio",     science:"Con la fine delle mestruazioni, l'ipofisi inizia a rilasciare FSH, che stimola la crescita di più follicoli nelle ovaie. Uno diventerà dominante e produrrà estrogeni in quantità crescente.\n\nGli estrogeni in salita migliorano la sensibilità all'insulina, aumentano la sintesi proteica muscolare, migliorano l'umore e la memoria. Il metabolismo accelera e la tolleranza al dolore aumenta — il corpo è letteralmente più forte in questa fase.", tips:"💡 Consigli pratici:\n• Momento ideale per aumentare l'intensità o provare qualcosa di nuovo\n• Il recupero muscolare è più rapido: puoi allenarti più giorni di fila\n• Approfitta della maggiore concentrazione per obiettivi impegnativi\n• Idratati bene — il metabolismo accelerato consuma più liquidi", defaultWorkouts:["Zumba","Salto corda","Cyclette","Push up"] },
  { name:"Ovulatoria",  color:"#8b5cf6", bg:"#f5f0ff", emoji:"🌕", description:"Picco di energia! Datti da fare",          science:"Un picco di LH provoca il rilascio dell'ovulo. Gli estrogeni sono al massimo e il testosterone aumenta leggermente — questo cocktail ormonale è responsabile del picco di energia fisica e mentale.\n\nForza, coordinazione, resistenza e velocità di recupero sono tutte al top. L'umore tende ad essere stabile e la voglia di socializzare aumenta — effetto diretto degli estrogeni sul sistema limbico.", tips:"💡 Consigli pratici:\n• Sfrutta questa finestra per allenamenti ad alta intensità: HIIT, circuit training\n• Momento migliore per testare i tuoi limiti — record personali e nuovi obiettivi\n• Ottimo per sport di squadra o lezioni di gruppo\n• Attenzione: gli estrogeni alti rendono i legamenti più lassi, scalda bene prima", defaultWorkouts:["Zumba","Salto corda intensa","Cyclette veloce","HIIT"] },
  { name:"Luteale",     color:"#2a9d8f", bg:"#f0faf9", emoji:"🌘", description:"Rallenta gradualmente, ascolta il corpo", science:"Il follicolo svuotato diventa il corpo luteo, che produce progesterone per preparare l'utero. Questo ormone aumenta la temperatura corporea basale, rallenta la digestione e favorisce la ritenzione idrica.\n\nSe non avviene fecondazione, il corpo luteo si dissolve verso il giorno 25-26, causando il crollo ormonale. Questa caduta è la causa diretta dei sintomi premestruali: gonfiore, irritabilità, voglia di carboidrati e sensibilità emotiva.", tips:"💡 Consigli pratici:\n• Nella prima parte (giorni 18-22) puoi ancora fare cardio moderato\n• Nella seconda parte (giorni 23-28) preferisci yoga, pilates, passeggiate\n• Il magnesio (noci, cioccolato fondente, banane) aiuta con gonfiore e irritabilità\n• Sii gentile con te stessa: la stanchezza che senti è reale, non è pigrizia", defaultWorkouts:["Yoga","Cyclette leggera","Stretching","Pilates"] },
];

function formatDate(d) { return d.toISOString().split("T")[0]; }
function addDays(dateStr, n) { const d = new Date(dateStr+"T12:00:00"); d.setDate(d.getDate()+n); return formatDate(d); }
function diffDays(a, b) { return Math.round((new Date(b+"T12:00:00") - new Date(a+"T12:00:00")) / 86400000); }

function avgCycleLength(cycles) {
  const sorted = [...cycles].sort((a,b) => a.start.localeCompare(b.start));
  if (sorted.length < 2) return 28;
  const diffs = [];
  for (let i = 1; i < sorted.length; i++) diffs.push(diffDays(sorted[i-1].start, sorted[i].start));
  return Math.round(diffs.reduce((a,b) => a+b, 0) / diffs.length);
}

function getPredictedCycles(cycles, today) {
  if (cycles.length === 0) return [];
  const sorted = [...cycles].sort((a,b) => b.start.localeCompare(a.start));
  const last = sorted[0];
  const cycleLen = avgCycleLength(cycles);
  const avgMens = Math.round(cycles.reduce((s,c) => s + (c.mensDuration||5), 0) / cycles.length);
  const predicted = [];
  let nextStart = addDays(last.start, cycleLen);
  const limit = addDays(formatDate(today), 180);
  while (nextStart <= limit) {
    predicted.push({ start: nextStart, mensDuration: avgMens, predicted: true });
    nextStart = addDays(nextStart, cycleLen);
  }
  return predicted;
}

function getDayOfCycle(dateStr, cycles) {
  if (!cycles || cycles.length === 0) return null;
  const sorted = [...cycles].sort((a,b) => b.start.localeCompare(a.start));
  const cycle = sorted.find(c => c.start <= dateStr);
  if (!cycle) return null;
  const diff = diffDays(cycle.start, dateStr);
  return diff < 0 ? null : (diff % 28) + 1;
}

function getPhaseForDate(dateStr, allCycles) {
  if (!allCycles || allCycles.length === 0) return null;
  const sorted = [...allCycles].sort((a,b) => b.start.localeCompare(a.start));
  const cycle = sorted.find(c => c.start <= dateStr);
  if (!cycle) return null;
  const diff = diffDays(cycle.start, dateStr);
  if (diff < 0) return null;
  const md = cycle.mensDuration || 5;
  // Se il ciclo è previsto (non confermato), non mostrare mai la fase mestruale
  // — rimane luteale finché l'utente non segna l'inizio reale
  if (cycle.predicted) {
    if (diff < 13)  return DEFAULT_PHASES[1]; // Follicolare
    if (diff < 17)  return DEFAULT_PHASES[2]; // Ovulatoria
    return DEFAULT_PHASES[3];                 // Luteale
  }
  if (diff < md)  return DEFAULT_PHASES[0];
  if (diff < 13)  return DEFAULT_PHASES[1];
  if (diff < 17)  return DEFAULT_PHASES[2];
  if (diff < 28)  return DEFAULT_PHASES[3];
  // Oltre il giorno 28 del ciclo reale — ciclo in ritardo, rimane luteale
  return DEFAULT_PHASES[3];
}

// Luna animata SVG per la fase corrente
function MoonAnim({ phase }) {
  const [frame, setFrame] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setFrame(f => (f+1) % 60), 50);
    return () => clearInterval(id);
  }, []);
  const t = frame / 60;
  const glow = 8 + Math.sin(t * Math.PI * 2) * 4;
  const brightness = 0.85 + Math.sin(t * Math.PI * 2) * 0.15;

  if (!phase) return <span style={{ fontSize:48 }}>🌙</span>;

  const emojis = { "Mestruale":"🌑","Follicolare":"🌒","Ovulatoria":"🌕","Luteale":"🌘" };
  const colors = { "Mestruale":"#e07b8a","Follicolare":"#f4a261","Ovulatoria":"#8b5cf6","Luteale":"#2a9d8f" };
  const c = colors[phase.name] || "#e07b8a";

  return (
    <div style={{ position:"relative", display:"inline-block", width:64, height:64 }}>
      <svg width="64" height="64" viewBox="0 0 64 64" style={{ position:"absolute", top:0, left:0 }}>
        <defs>
          <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor={c} stopOpacity={0.35 * brightness} />
            <stop offset="100%" stopColor={c} stopOpacity={0} />
          </radialGradient>
        </defs>
        <circle cx="32" cy="32" r={28 + glow * 0.5} fill="url(#moonGlow)" />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center",
        fontSize:36, filter:`drop-shadow(0 0 ${glow}px ${c})`, transform:`scale(${brightness})`, transition:"transform 0.1s" }}>
        {emojis[phase.name]}
      </div>
    </div>
  );
}

const KEY = "lunaMovimento_v9";
function load() {
  try { const r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch {}
  try {
    const old = localStorage.getItem("lunaMovimento_v8");
    if (old) { const o = JSON.parse(old); return { cycles: o.cycles||[], logs: o.logs||{}, customWorkouts: o.customWorkouts||{}, extraWorkouts: [], extraSymptoms: [] }; }
  } catch {}
  return { cycles: [], logs: {}, customWorkouts: {}, extraWorkouts: [], extraSymptoms: [] };
}

    setData(p => ({ ...p, logs: { ...p.logs, [date]: { ...(p.logs[date]||{}), [field]: value } } }));
  const toggleArr = (date, field, value) => {
    const cur = (data.logs[date] && data.logs[date][field]) || [];
    updateLog(date, field, cur.includes(value) ? cur.filter(v=>v!==value) : [...cur, value]);
  };
  const getSug = function(phase) { return (data.customWorkouts && data.customWorkouts[phase.name]) || phase.defaultWorkouts; };

  const setCycleStart = (dateStr) => {
    setData(p => {
      if (p.cycles.find(c => c.start === dateStr)) return p;
      return { ...p, cycles: [...p.cycles, { start: dateStr, end: null, mensDuration: 5 }] };
    });
  };
  const setCycleEnd = (dateStr) => {
    setData(p => {
      const sorted = [...p.cycles].sort((a,b) => b.start.localeCompare(a.start));
      const cycle = sorted.find(c => c.start <= dateStr);
      if (!cycle) return p;
      const idx = p.cycles.indexOf(cycle);
      const newCycles = [...p.cycles];
      newCycles[idx] = { ...cycle, end: dateStr, mensDuration: diffDays(cycle.start, dateStr) + 1 };
      return { ...p, cycles: newCycles };
    });
  };

  const predicted  = getPredictedCycles(data.cycles, today);
  const allCycles  = [...data.cycles, ...predicted];
  const cycleLen   = avgCycleLength(data.cycles);
  const selPhase   = getPhaseForDate(selectedDate, allCycles);
  const selLog     = data.logs[selectedDate] || {};
  const todayPhase = getPhaseForDate(formatDate(today), allCycles);
  const todayDoc   = getDayOfCycle(formatDate(today), data.cycles);

  // ── STATISTICHE ──
  const sortedCycles = [...data.cycles].sort((a,b) => a.start.localeCompare(b.start));
  const cycleDurations = [];
  for (let i = 1; i < sortedCycles.length; i++)
    cycleDurations.push({ label: sortedCycles[i-1].start.slice(5,10).replace("-","/"), val: diffDays(sortedCycles[i-1].start, sortedCycles[i].start) });

  // Umore medio per fase
  const moodByPhase = {};
  DEFAULT_PHASES.forEach(p => { moodByPhase[p.name] = []; });
  Object.entries(data.logs).forEach(([date, log]) => {
    const allMoods = [...(log.moods||[]), ...(log.mood ? [log.mood] : [])];
    if (allMoods.length === 0) return;
    const phase = getPhaseForDate(date, data.cycles);
    if (phase) allMoods.forEach(m => moodByPhase[phase.name].push(MOOD_SCORES[m] || 3));
  });
  const moodAvg = (name) => {
    const arr = moodByPhase[name];
    if (!arr || arr.length === 0) return null;
    return arr.reduce((a,b)=>a+b,0) / arr.length;
  };
  const moodEmoji = (score) => {
    if (score === null) return "—";
    if (score >= 5.5) return "😁";
    if (score >= 4.5) return "🤗";
    if (score >= 3.5) return "😊";
    if (score >= 2.5) return "😶";
    if (score >= 1.5) return "😤";
    return "😭";
  };

  // Conteggio gruppi umore globale
  const moodGroupCounts = { positivi: 0, neutri: 0, negativi: 0 };
  Object.values(data.logs).forEach(log => {
    const allMoods = [...(log.moods||[]), ...(log.mood ? [log.mood] : [])];
    if (allMoods.length === 0) return;
    allMoods.forEach(m => { const g = getMoodGroup(m); if (g) moodGroupCounts[g]++; });
  });
  const totalMoodEntries = Object.values(moodGroupCounts).reduce((a,b)=>a+b,0);

  // Sintomi per fase
  const symptomsByPhase = {};
  DEFAULT_PHASES.forEach(p => { symptomsByPhase[p.name] = {}; });
  Object.entries(data.logs).forEach(([date, log]) => {
    if (!(log.symptoms && log.symptoms.length)) return;
    const phase = getPhaseForDate(date, data.cycles);
    if (!phase) return;
    log.symptoms.forEach(s => {
      symptomsByPhase[phase.name][s] = (symptomsByPhase[phase.name][s] || 0) + 1;
    });
  });
  // Conta giorni per fase per normalizzare
  const daysByPhase = {};
  DEFAULT_PHASES.forEach(p => { daysByPhase[p.name] = 0; });
  Object.keys(data.logs).forEach(date => {
    const phase = getPhaseForDate(date, data.cycles);
    if (phase) daysByPhase[phase.name]++;
  });

  const year = viewMonth.getFullYear(), month = viewMonth.getMonth();
  const rawFirst = new Date(year, month, 1).getDay();
  const firstDay = (rawFirst + 6) % 7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const calDays = [...Array(firstDay).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];
  const MONTH_NAMES = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  const WEEK_DAYS   = ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];

  const f    = { fontFamily:"'Caveat',cursive", fontWeight:'600', letterSpacing:'0.01em' };
  const fCav = { fontFamily:"'Caveat',cursive", fontWeight:'700' };
  const fNun = { fontFamily:"'Nunito',sans-serif" };
  const navBtn = { ...f, background:"#fff", border:"1.5px solid #e0d0c8", borderRadius:10, padding:"8px 16px", cursor:"pointer", fontSize:18, color:"#666" };
  const card   = { background:"#fff", borderRadius:16, padding:16, marginBottom:14, boxShadow:"0 2px 8px rgba(0,0,0,0.06)" };
  const cardT  = { ...f, fontWeight:"800", fontSize:15, marginBottom:10, color:"#2d1f1f" };
  const pill   = (active, ac) => ({ ...f, padding:"7px 14px", borderRadius:20, border:`1.5px solid ${active?ac:"#e0d0c8"}`, background:active?ac:"#fff", color:active?"#fff":"#666", fontSize:13, cursor:"pointer", fontWeight:"700", transition:"all 0.15s" });

  const popupPhase  = DEFAULT_PHASES.find(p => p.name === popup);
  const isStartDay  = (d) => data.cycles.some(c => c.start === d);
  const isEndDay    = (d) => data.cycles.some(c => c.end === d);
  const isPredStart = (d) => predicted.some(c => c.start === d);
  const latestCycle = data.cycles.length > 0 ? [...data.cycles].sort((a,b) => b.start.localeCompare(a.start))[0] : null;
  const nextPred    = predicted.length > 0 ? predicted[0] : null;

  const maxCycleBar = cycleDurations.length ? Math.max(...cycleDurations.map(c=>c.val), 28) : 35;

  return (
    <div ref={swipeRef} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
      style={{ ...f, height:"100vh", background:"#fdf8f5", color:"#2d1f1f", userSelect:"none", display:"flex", flexDirection:"column", overflow:"hidden" }}>
      {/* POPUP FISIOLOGICO */}
      {popup && popupPhase && (
        <div onClick={() => setPopup(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:"#fff", borderRadius:20, padding:24, maxWidth:400, width:"100%", border:`2.5px solid ${popupPhase.color}`, boxShadow:`0 8px 32px ${popupPhase.color}30`, position:"relative", maxHeight:"80vh", overflowY:"auto" }}>
            <button onClick={() => setPopup(null)} style={{ position:"absolute", top:12, right:14, background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#bbb" }}>✕</button>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
              <MoonAnim phase={popupPhase} />
              <div style={{ ...f, fontWeight:"800", color:popupPhase.color, fontSize:18 }}>Fase {popupPhase.name}</div>
            </div>
            <div style={{ ...f, fontSize:13, color:"#555", lineHeight:1.75, fontWeight:"600", whiteSpace:"pre-line", marginBottom:16 }}>{popupPhase.science}</div>
            <div style={{ background:popupPhase.bg, borderRadius:12, padding:14, border:`1px solid ${popupPhase.color}40` }}>
              <div style={{ ...f, fontSize:13, color:popupPhase.color, lineHeight:1.75, fontWeight:"700", whiteSpace:"pre-line" }}>{popupPhase.tips}</div>
            </div>
          </div>
        </div>
      )}

      {/* MODAL GIORNO */}
      {dayModal && (
        <div onClick={() => setDayModal(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:"#fff", borderRadius:20, padding:20, maxWidth:360, width:"100%", border:"2px solid #e07b8a", boxShadow:"0 8px 32px #e07b8a25", position:"relative", maxHeight:"85vh", overflowY:"auto" }}>
            <button onClick={() => setDayModal(null)} style={{ position:"absolute", top:12, right:14, background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#bbb" }}>✕</button>
            <div style={{ ...f, fontWeight:"800", fontSize:16, color:"#2d1f1f", marginBottom:14 }}>
              {new Date(dayModal+"T12:00:00").toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"})}
            </div>

            {/* Ciclo */}
            <div style={{ display:"flex", gap:8, marginBottom:14 }}>
              <button onClick={() => { if(isStartDay(dayModal)){setData(p=>({...p,cycles:p.cycles.filter(c=>c.start!==dayModal)}))}else{setCycleStart(dayModal)}; setDayModal(null); }}
                style={{ ...f, flex:1, padding:"10px 8px", borderRadius:12, border:`2px solid #e07b8a`, background:isStartDay(dayModal)?"#e07b8a":"#fdf0f2", color:isStartDay(dayModal)?"#fff":"#e07b8a", fontWeight:"800", fontSize:12, cursor:"pointer", textAlign:"center" }}>
                🩸 {isStartDay(dayModal) ? "Togli inizio" : "Inizio ciclo"}
              </button>
              <button onClick={() => { if(isEndDay(dayModal)){setData(p=>({...p,cycles:p.cycles.map(c=>c.end===dayModal?{...c,end:null,mensDuration:5}:c)}))}else{setCycleEnd(dayModal)}; setDayModal(null); }}
                style={{ ...f, flex:1, padding:"10px 8px", borderRadius:12, border:`2px solid #e07b8a`, background:isEndDay(dayModal)?"#e07b8a":"#fdf0f2", color:isEndDay(dayModal)?"#fff":"#e07b8a", fontWeight:"800", fontSize:12, cursor:"pointer", textAlign:"center" }}>
                🩸 {isEndDay(dayModal) ? "Togli fine" : "Fine ciclo"}
              </button>
              <button onClick={() => { setSelectedDate(dayModal); setDayModal(null); setTabIdx(1); }}
                style={{ ...f, flex:1, padding:"10px 8px", borderRadius:12, border:"2px solid #f4a261", background:"#fff8f0", color:"#f4a261", fontWeight:"800", fontSize:12, cursor:"pointer", textAlign:"center" }}>
                ✏️ Diario
              </button>
            </div>

            {/* Umore rapido */}
            <div style={{ ...f, fontSize:12, fontWeight:"800", color:"#aaa", marginBottom:8 }}>😊 Come stai?</div>
            {Object.entries(MOOD_GROUPS).map(([key, group]) => (
              <div key={key} style={{ background:group.bg, border:`1px solid ${group.color}30`, borderRadius:12, padding:"8px 6px", marginBottom:6 }}>
                <div style={{ display:"flex", gap:2, justifyContent:"space-between" }}>
                  {[["😁","Felice"],["😏","Soddisfatta"],["🤗","Speranzosa"],["😎","Determinata"],["😌","Rilassata"],["😜","Giocosa"],
                    ["😊","Normale"],["🥸","Strana"],["😶","Apatica"],["🤔","Pensierosa"],["😴","Stanca"],["😮‍💨","Annoiata"],
                    ["😭","Triste"],["😰","Preoccupata"],["🤬","Arrabbiata"],["😤","Nervosa"],["🥺","Insicura"],["😶‍🌫️","Solitaria"]]
                    .filter(([m]) => group.moods.includes(m))
                    .map(([m, label]) => {
                      const dayLog = data.logs[dayModal] || {};
                      const selected = (dayLog.moods||[]).includes(m);
                      return (
                        <button key={m} onClick={() => toggleArr(dayModal,"moods",m)}
                          style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:1, background:selected?group.color:"rgba(255,255,255,0.7)", border:`1.5px solid ${selected?group.color:group.color+"50"}`, borderRadius:8, padding:"4px 2px", cursor:"pointer", flex:1 }}>
                          <span style={{ fontSize:18 }}>{m}</span>
                          <span style={{ ...f, fontSize:6, color:selected?"#fff":group.color, fontWeight:"800", whiteSpace:"nowrap", overflow:"hidden", maxWidth:"100%", textAlign:"center" }}>{label}</span>
                        </button>
                      );
                    })}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* HEADER */}
      <div style={{ position:"relative", overflow:"hidden", minHeight:110 }}>
        <img src={HEADER_IMG} alt="" style={{ position:"absolute", top:"-25%", left:"0%", width:"110%", height:"140%", objectFit:"cover", objectPosition:"left top" }} />
        <div style={{ position:"absolute", inset:0, background:"linear-gradient(135deg, rgba(224,123,138,0.45) 0%, rgba(244,162,97,0.35) 50%, rgba(139,92,246,0.45) 100%)" }} />
        <div style={{ position:"relative", zIndex:1, padding:"16px 16px 16px 0", display:"flex", alignItems:"center", minHeight:110 }}>
          {/* Spazio per la bambina a sinistra */}
          <div style={{ width:"42%" }} />
          {/* Titolo al centro-destra */}
          <div style={{ flex:1, textAlign:"center" }}>
            <h1 style={{ margin:0, fontSize:22, color:"#fff", fontFamily:"'Dancing Script',cursive", fontWeight:700, lineHeight:1.1, textShadow:"0 2px 8px rgba(0,0,0,0.3)" }}>LunaThina</h1>
            <p style={{ margin:"4px 0 0", color:"rgba(255,255,255,0.9)", fontSize:11, fontFamily:"'Nunito',sans-serif" }}>
              {todayPhase ? "Oggi: fase " + todayPhase.name : "il tuo ciclo, i tuoi allenamenti"}
            </p>
          </div>
          {/* Luna animata a destra */}
          <MoonAnim phase={todayPhase} />
        </div>
      </div>

      {/* TABS */}
      <div style={{ display:"flex", borderBottom:"2px solid #f0e8e0", background:"#fff" }}>
        {[["calendar","📅","Calendario"],["log","✏️","Diario"],["insights","💡","Fasi"],["stats","📊","Stats"]].map(([id,icon,label], idx) => (
          <button key={id} onClick={() => setTabIdx(idx)} style={{ ...f, flex:1, padding:"8px 4px 6px", border:"none", background:"none", cursor:"pointer", color:tabIdx===idx?"#e07b8a":"#ccc", borderBottom:tabIdx===idx?"2px solid #e07b8a":"2px solid transparent", marginBottom:-2, transition:"all 0.2s", display:"flex", flexDirection:"column", alignItems:"center", gap:1 }}>
            <span style={{ fontSize:18 }}>{icon}</span>
            <span style={{ fontSize:9, fontWeight:"800" }}>{label}</span>
          </button>
        ))}
      </div>

      <div style={{ padding:"14px 16px 24px", maxWidth:480, margin:"0 auto", flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch" }}>

        {/* SETUP */}
        {data.cycles.length === 0 && (
          <div style={{ background:"#fff", borderRadius:16, padding:20, marginBottom:16, border:"2px dashed #e07b8a", textAlign:"center" }}>
            <div style={{ fontSize:36 }}>🌸</div>
            <p style={{ margin:"8px 0", fontWeight:"800", color:"#e07b8a", ...f }}>Quando è iniziato il tuo ultimo ciclo?</p>
            <input type="date" onChange={e => { if(e.target.value) setCycleStart(e.target.value); }}
              style={{ ...f, padding:"10px 16px", borderRadius:10, border:"1.5px solid #e07b8a", fontSize:15, color:"#2d1f1f", background:"#fdf8f5", outline:"none" }} />
          </div>
        )}

        {/* ── CALENDARIO ── */}
        {tab === "calendar" && (
          <div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
              <button onClick={() => setViewMonth(new Date(year,month-1,1))} style={navBtn}>‹</button>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                <span style={{ fontFamily:"'Caveat',cursive", fontWeight:"700", fontSize:17, textTransform:"uppercase" }}>{MONTH_NAMES[month]} {year}</span>
                {!(month === today.getMonth() && year === today.getFullYear()) && (
                  <button onClick={() => { setViewMonth(new Date(today.getFullYear(), today.getMonth(), 1)); setSelectedDate(formatDate(today)); }}
                    style={{ ...f, fontSize:11, fontWeight:"800", color:"#e07b8a", background:"#fdf0f2", border:"1.5px solid #e07b8a", borderRadius:20, padding:"2px 12px", cursor:"pointer" }}>
                    ✨ oggi
                  </button>
                )}
              </div>
              <button onClick={() => setViewMonth(new Date(year,month+1,1))} style={navBtn}>›</button>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:5, marginBottom:14 }}>
              {WEEK_DAYS.map(w => (
                <div key={w} style={{ ...f, textAlign:"center", fontSize:11, color:"#bbb", padding:"4px 0", fontWeight:"800" }}>{w}</div>
              ))}
              {calDays.map((d,i) => {
                if (!d) return <div key={i} />;
                const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                const phase      = getPhaseForDate(dateStr, allCycles);
                const isPred     = getPhaseForDate(dateStr, predicted) !== null && getPhaseForDate(dateStr, data.cycles) === null;
                const log        = data.logs[dateStr] || {};
                const isToday    = dateStr === formatDate(today);
                const isSel      = dateStr === selectedDate;
                const hasW       = (log.workouts && log.workouts.length > 0);
                const showBlood  = isStartDay(dateStr) || isEndDay(dateStr);
                const realPhase  = getPhaseForDate(dateStr, data.cycles);
                const showPredBlood = !showBlood && isPredStart(dateStr) && (realPhase && realPhase.name) !== "Mestruale";
                // Giorno ovulazione = durata media ciclo - 14
                const docNum = getDayOfCycle(dateStr, data.cycles);
                const ovulationDay = Math.max(10, cycleLen - 14);
                const isOvulation = docNum === ovulationDay;
                let border = "2px solid transparent";
                if (isSel)        border = `3px solid ${(phase && phase.color)||"#e07b8a"}`;
                else if (isToday) border = `2px solid ${(phase && phase.color)||"#e07b8a"}`;
                else if (phase)   border = `2px solid ${phase.color}${isPred?"33":"55"}`;
                return (
                  <div key={i} onClick={() => setDayModal(dateStr)} style={{
                    borderRadius:10, cursor:"pointer", position:"relative",
                    background:isSel?((phase && phase.bg)||"#fdf0f2"):"#fff", border,
                    opacity:isPred&&!isSel?0.7:1,
                    boxShadow:isSel?`0 4px 12px ${(phase && phase.color)||"#e07b8a"}40`:"0 1px 3px rgba(0,0,0,0.06)",
                    transform:isSel?"scale(1.1)":"scale(1)", transition:"transform 0.12s",
                    minHeight:42, padding:"3px 4px 5px",
                  }}>
                    {showBlood && <div style={{ position:"absolute", top:1, right:2, fontSize:8 }}>🩸</div>}
                    {showPredBlood && <div style={{ position:"absolute", top:1, right:2, fontSize:7, opacity:0.5 }}>🩸</div>}
                    <div style={{ ...fCav, fontSize:10, fontWeight:"700", lineHeight:1, color:phase?phase.color:"#bbb", textAlign:"left", paddingLeft:2, paddingTop:1 }}>
                      {isOvulation ? (
                        <span style={{ background:`${DEFAULT_PHASES[2].color}40`, borderRadius:3, padding:"0 2px" }}>{d}</span>
                      ) : d}
                    </div>
                    <div style={{ display:"flex", justifyContent:"center", alignItems:"center", flexWrap:"wrap", gap:1, marginTop:1 }}>
                      {hasW && (log.workouts||[]).map(w => {
                        const found = WORKOUTS.find(([,n]) => n === w);
                        if (found) return <span key={w} style={{ fontSize:9, lineHeight:1 }}>{found[0]}</span>;
                        const emojiMatch = w.match(/^(\p{Emoji_Presentation}|\p{Extended_Pictographic})[\p{Emoji_Modifier}\uFE0F]*/u);
                        return <span key={w} style={{ fontSize:9, lineHeight:1 }}>{emojiMatch ? emojiMatch[0] : "💪"}</span>;
                      })}
                      {log.mood && <span style={{ fontSize:9, lineHeight:1 }}>{log.mood}</span>}
                      {!log.mood && (log.moods||[]).slice(0,2).map(m => <span key={m} style={{ fontSize:9, lineHeight:1 }}>{m}</span>)}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
              {DEFAULT_PHASES.map(p => (
                <span key={p.name} style={{ ...f, fontSize:11, padding:"3px 9px", borderRadius:20, background:p.bg, color:p.color, fontWeight:"800", border:`2px solid ${p.color}`, display:"inline-flex", alignItems:"center", gap:5 }}>
                  <span style={{ width:8, height:8, borderRadius:2, background:p.color, display:"inline-block" }} />{p.name}
                </span>
              ))}
              <span style={{ ...f, fontSize:11, padding:"3px 9px", borderRadius:20, background:"#f5f5f5", color:"#aaa", fontWeight:"800", border:"2px solid #ddd", display:"inline-flex", alignItems:"center", gap:5 }}>
                <span style={{ opacity:0.5 }}>🩸</span> previsto
              </span>
            </div>
            {latestCycle && (
              <div style={{ ...f, fontSize:12, color:"#bbb", marginTop:8, display:"flex", gap:12, alignItems:"center", flexWrap:"wrap" }}>
                <span>🩸 Ultimo: {new Date(latestCycle.start+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short"})}</span>
                {latestCycle.end && <span>→ {new Date(latestCycle.end+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short"})}</span>}
              </div>
            )}
            {data.cycles.length > 0 && nextPred && (
              <div style={{ background:"#fff8f0", borderRadius:14, padding:"10px 14px", marginTop:12, border:"1.5px solid #f4a261", display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:20 }}>✨</span>
                <div>
                  <div style={{ ...f, fontWeight:"800", fontSize:13, color:"#f4a261" }}>Prossimo ciclo previsto</div>
                  <div style={{ ...f, fontSize:12, color:"#aaa" }}>{new Date(nextPred.start+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"long"})} · media {cycleLen} giorni</div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── DIARIO ── */}
        {tab === "log" && (
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
              <button onClick={() => {
                const d = new Date(selectedDate+"T12:00:00");
                d.setDate(d.getDate()-1);
                setSelectedDate(formatDate(d));
              }} style={{ ...navBtn, padding:"8px 12px", fontSize:18 }}>‹</button>
              <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)}
                style={{ ...f, flex:1, padding:"10px 10px", borderRadius:12, border:"1.5px solid #e0d0c8", fontSize:14, background:"#fff", color:"#2d1f1f", outline:"none", textAlign:"center" }} />
              <button onClick={() => {
                const d = new Date(selectedDate+"T12:00:00");
                d.setDate(d.getDate()+1);
                setSelectedDate(formatDate(d));
              }} style={{ ...navBtn, padding:"8px 12px", fontSize:18 }}>›</button>
              <button onClick={() => setSelectedDate(formatDate(today))} style={{ ...navBtn, fontSize:11, padding:"8px 10px", color:"#e07b8a", borderColor:"#e07b8a" }}>oggi</button>

            const x4 = cx + r2 * Math.cos(s), y4 = cy + r2 * Math.sin(s);
            return `M ${x1} ${y1} A ${r1} ${r1} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${r2} ${r2} 0 ${large} 0 ${x4} ${y4} Z`;

                    {/* Luce speculare */}

                    <div style={{ display:"flex", borderBottom:`1px solid ${activePhase.color}30` }}>
                      {[["desc","📖 Descrizione"],["tips","💡 Consigli"]].map(([id,label]) => (
                        <button key={id} onClick={() => setInsightTab(id)} style={{ ...f, flex:1, padding:"10px 4px", border:"none", background:"none", cursor:"pointer", fontSize:13, fontWeight:insightTab===id?"800":"600", color:insightTab===id?activePhase.color:"#aaa", borderBottom:insightTab===id?`2px solid ${activePhase.color}`:"2px solid transparent", marginBottom:-1 }}>{label}</button>
                      ))}
                    </div>
                    {/* Contenuto tab */}
                    <div style={{ padding:16 }}>
                      {insightTab === "desc" && (
                        <div style={{ ...fNun, fontSize:13, color:"#555", lineHeight:1.75, fontWeight:"600", whiteSpace:"pre-line" }}>{activePhase.science}</div>
                      )}
                        {insightTab === "tips" && (
                        <div style={{ ...fNun, fontSize:13, color:activePhase.color, lineHeight:1.75, fontWeight:"700", whiteSpace:"pre-line" }}>{activePhase.tips}</div>
                      )}
                    {/* Workout suggeriti */}
                    <div style={{ marginTop:12, paddingTop:12, borderTop:`1px solid ${activePhase.color}30` }}>
                      <div style={{ ...f, fontSize:12, color:activePhase.color, fontWeight:"700", marginBottom:8 }}>💪 Allenamenti consigliati</div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                        {getSug(activePhase).map(w => {
                          const found = WORKOUTS.find(([,n]) => n === w);
                          return <span key={w} style={{ ...f, padding:"4px 10px", borderRadius:20, background:"#fff", border:`1.5px solid ${activePhase.color}`, fontSize:12, color:activePhase.color, fontWeight:"700" }}>{found ? `${found[0]} ${w}` : w}</span>;
                        })}
                      </div>
                      <button onClick={() => setEditSug(!editSug)} style={{ ...f, marginTop:8, background:"none", border:`1px solid ${activePhase.color}`, color:activePhase.color, borderRadius:8, fontSize:11, padding:"3px 10px", cursor:"pointer" }}>
                        {editSug ? "✓ Fatto" : "✏️ Modifica"}
                      </button>
                      {editSug && (
                        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:8 }}>
                          {WORKOUTS.map(([emoji, name]) => { const on = getSug(activePhase).includes(name); return (
                            <button key={name} onClick={() => {
                              const cur = getSug(activePhase);
                              const next = cur.includes(name) ? cur.filter(x=>x!==name) : [...cur,name];
                              setData(p => ({ ...p, customWorkouts:{ ...(p.customWorkouts||{}), [activePhase.name]:next } }));
                            }} style={{ ...pill(on, activePhase.color), display:"flex", alignItems:"center", gap:4 }}><span>{emoji}</span><span>{name}</span></button>
                          ); })}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        );
      })()}

        {/* ── STATISTICHE ── */}
        {tab === "stats" && (
          <div>
            <p style={{ ...f, fontSize:14, color:"#bbb", marginTop:0, fontWeight:"600" }}>I tuoi pattern nel tempo 📊</p>

            {data.cycles.length < 2 ? (
              <div style={{ background:"#fff", borderRadius:16, padding:20, textAlign:"center", border:"2px dashed #e0d0c8" }}>
                <div style={{ fontSize:32, marginBottom:8 }}>🌱</div>
                <div style={{ ...f, color:"#bbb", fontSize:13 }}>Aggiungi almeno 2 cicli per vedere le statistiche!</div>
              </div>
            ) : (
              <>
                {/* Grafico umore per ciclo */}
                <div style={card}>
                  <div style={cardT}>📈 Andamento umore per ciclo</div>
                  {(() => {
                    const W = 320, H = 160, PAD = { t:10, r:10, b:24, l:28 };
                    const chartW = W - PAD.l - PAD.r;
                    const chartH = H - PAD.t - PAD.b;
                    const realCycles = [...data.cycles].sort((a,b) => a.start.localeCompare(b.start));
                    const cyclesWithData = realCycles.map((cycle, idx) => {
                      const points = [];
                      for (let d = 0; d < 28; d++) {
                        const dateStr = addDays(cycle.start, d);
                        const log = data.logs[dateStr];
                        const allMoods = [...((log && log.moods)||[]), ...((log && log.mood) ? [log.mood] : [])];
                        if (allMoods.length > 0) {
                          const avg = allMoods.reduce((a,m) => a + (MOOD_SCORES[m]||3), 0) / allMoods.length;
                          const groupCounts = {};
                          allMoods.forEach(m => { const g = getMoodGroup(m); if(g) groupCounts[g] = (groupCounts[g]||0)+1; });
                          const dominantGroup = (function(){ var _d=Object.entries(groupCounts).sort(function(a,b){return b[1]-a[1]})[0]; return _d?_d[0]:null; })();
                          points.push({ day: d+1, score: avg, dominantGroup });
                        }
                      }
                      return { cycle, points, idx };
                    }).filter(l => l.points.length > 0);

                    if (cyclesWithData.length === 0) return <div style={{ ...f, fontSize:12, color:"#ccc", textAlign:"center" }}>Nessun umore registrato ancora</div>;

                    const curIdx = Math.min(selectedCycleIdx, cyclesWithData.length - 1);
                    const { cycle, points } = cyclesWithData[curIdx];
                    const md = cycle.mensDuration || 5;

                    const xPos = (day) => PAD.l + ((day-1)/27) * chartW;
                    const yPos = (score) => PAD.t + chartH - ((score-1)/5) * chartH;
                    const phaseBands = [
                      { from:1,      to:md,   color:"#fdf0f2", phase: DEFAULT_PHASES[0] },
                      { from:md+1,   to:13,   color:"#fff8f0", phase: DEFAULT_PHASES[1] },
                      { from:14,     to:17,   color:"#f5f0ff", phase: DEFAULT_PHASES[2] },
                      { from:18,     to:28,   color:"#f0faf9", phase: DEFAULT_PHASES[3] },
                    ];
                    const pathD = points.map((p,i) => `${i===0?"M":"L"}${xPos(p.day)},${yPos(p.score)}`).join(" ");
                    const cycleLabel = new Date(cycle.start+"T12:00:00").toLocaleDateString("it-IT",{month:"long", year:"numeric"});

                    return (
                      <>
                        {/* Navigazione cicli */}
                        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
                          <button onClick={() => setSelectedCycleIdx(Math.max(0, curIdx-1))}
                            style={{ ...navBtn, padding:"6px 14px", fontSize:16, opacity: curIdx===0 ? 0.3 : 1 }}>‹</button>
                          <div style={{ textAlign:"center" }}>
                            <div style={{ ...f, fontWeight:"800", fontSize:14, color:"#2d1f1f" }}>Ciclo {curIdx+1} di {cyclesWithData.length}</div>
                            <div style={{ ...f, fontSize:12, color:"#aaa" }}>{cycleLabel}</div>
                          </div>
                          <button onClick={() => setSelectedCycleIdx(Math.min(cyclesWithData.length-1, curIdx+1))}
                            style={{ ...navBtn, padding:"6px 14px", fontSize:16, opacity: curIdx===cyclesWithData.length-1 ? 0.3 : 1 }}>›</button>
                        </div>

                        <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
                          {/* Bande di fase */}
                          {phaseBands.map(({from,to,color:bc}) => (
                            <rect key={from} x={xPos(from)} y={PAD.t} width={xPos(to+1)-xPos(from)} height={chartH} fill={bc} />
                          ))}
                          {/* Griglia Y */}
                          {[1,2,3,4,5,6].map(s => (
                            <g key={s}>
                              <line x1={PAD.l} y1={yPos(s)} x2={PAD.l+chartW} y2={yPos(s)} stroke="#f0e8e0" strokeWidth="1" />
                              <text x={PAD.l-4} y={yPos(s)} textAnchor="end" dominantBaseline="middle"
                                style={{ fontSize:8, fontFamily:"'Nunito',sans-serif", fill:"#ccc" }}>
                                {["","😭","😤","😶","😊","🤗","😁"][s]}
                              </text>
                            </g>
                          ))}
                          {/* Etichette fasi X */}
                          {[{d:3,p:DEFAULT_PHASES[0]},{d:10,p:DEFAULT_PHASES[1]},{d:15,p:DEFAULT_PHASES[2]},{d:23,p:DEFAULT_PHASES[3]}].map(({d,p}) => (
                            <text key={d} x={xPos(d)} y={H-6} textAnchor="middle"
                              style={{ fontSize:7, fontFamily:"'Nunito',sans-serif", fill:p.color, fontWeight:"800" }}>{p.name.slice(0,1)}</text>
                          ))}
                          {/* Linea umore */}
                          {points.length > 1 && <path d={pathD} fill="none" stroke="#e0d0c8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="3,2" />}
                          {/* Punti colorati per gruppo umore */}
                          {points.map((p,i) => {
                            const groupColor = p.dominantGroup ? MOOD_GROUPS[p.dominantGroup].color : "#aaa";
                            return <circle key={i} cx={xPos(p.day)} cy={yPos(p.score)} r="3.5" fill={groupColor} stroke="#fff" strokeWidth="1" />;
                          })}
                        </svg>

                      </>
                    );
                  })()}
                </div>
                {/* Umore per gruppo — grafico a barre orizzontali per mese */}
                <div style={card}>
                  <div style={cardT}>😊 Umore per gruppo</div>
                  {(() => {
                    // Colori sfumati per gruppo (dopo swap: neutri=rosa, negativi=viola)
                    const groupShades = {
                      positivi: ["#f4a261","#e8915a","#fbbe8e","#f9d4a8","#fce8cc","#fff0db"],
                      neutri:   ["#e07b8a","#cc6070","#ea9daa","#f2bec6","#f8d8de","#fdeef0"],
                      negativi: ["#8b5cf6","#7c4de8","#a87ef9","#c4a8fb","#dccefe","#ede0ff"],
                    };

                    const moodLabels = {"😁":"Felice","😏":"Soddisfatta","🤗":"Speranzosa","😎":"Determinata","😌":"Rilassata","😜":"Giocosa","😊":"Normale","🥸":"Strana","😶":"Apatica","🤔":"Pensierosa","😴":"Stanca","😮‍💨":"Annoiata","😭":"Triste","😰":"Preoccupata","🤬":"Arrabbiata","😤":"Nervosa","🥺":"Insicura","😶‍🌫️":"Solitaria"};

                    const monthsMap = {};
                    Object.entries(data.logs).forEach(([date, log]) => {
                      const allMoods = [...(log.moods||[]), ...(log.mood ? [log.mood] : [])];
                      if (allMoods.length === 0) return;
                      const monthKey = date.slice(0,7);
                      if (!monthsMap[monthKey]) monthsMap[monthKey] = {};
                      allMoods.forEach(m => { monthsMap[monthKey][m] = (monthsMap[monthKey][m]||0) + 1; });
                    });

                    const months = Object.keys(monthsMap).sort();
                    if (months.length === 0) return <div style={{ ...f, fontSize:12, color:"#ccc" }}>Nessun umore registrato ancora</div>;

                    const mIdx = Math.min(selectedMonthIdx, months.length-1);
                    const monthKey = months[mIdx];
                    const moodCounts = monthsMap[monthKey];
                    const [y, m] = monthKey.split("-");
                    const MN = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

                    // Totale per gruppo per barre proporzionali
                    const groupTotals = {};
                    Object.entries(MOOD_GROUPS).forEach(([key, group]) => {
                      groupTotals[key] = group.moods.reduce((a,m) => a + (moodCounts[m]||0), 0);
                    });
                    const maxGroupTotal = Math.max(...Object.values(groupTotals), 1);

                    return (
                      <>
                        {/* Nav mese */}
                        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                          <button onClick={() => setSelectedMonthIdx(Math.max(0, mIdx-1))}
                            style={{ ...navBtn, padding:"6px 14px", fontSize:16, opacity:mIdx===0?0.3:1 }}>‹</button>
                          <span style={{ ...f, fontWeight:"800", fontSize:14, color:"#2d1f1f" }}>{MN[parseInt(m)-1]} {y}</span>
                          <button onClick={() => setSelectedMonthIdx(Math.min(months.length-1, mIdx+1))}
                            style={{ ...navBtn, padding:"6px 14px", fontSize:16, opacity:mIdx===months.length-1?0.3:1 }}>›</button>
                        </div>

                        {Object.entries(MOOD_GROUPS).map(([key, group]) => {
                          const emojisInGroup = group.moods;
                          const counts = emojisInGroup.map(m => ({ emoji:m, label:moodLabels[m]||m, count:moodCounts[m]||0 })).filter(e => e.count > 0);
                          const total = counts.reduce((a,b) => a+b.count, 0);
                          const shades = groupShades[key];
                          const barWidth = (total / maxGroupTotal) * 100;
                          const totalAll = Object.values(groupTotals).reduce((a,b)=>a+b,0);
                          const pct = totalAll > 0 ? Math.round((total/totalAll)*100) : 0;

                          return (
                            <div key={key} style={{ marginBottom:12 }}>
                              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                                <div style={{ ...f, fontSize:12, fontWeight:"800", color:group.color }}>{group.label}</div>
                                {total > 0 && <div style={{ ...f, fontSize:12, fontWeight:"800", color:group.color }}>{pct}%</div>}
                              </div>
                              {total === 0 ? (
                                <div style={{ ...f, fontSize:11, color:"#ccc" }}>nessun dato</div>
                              ) : (
                                <>
                                  {/* Barra proporzionale — più sottile */}
                                  <div style={{ background:"#f5f0eb", borderRadius:20, height:22, overflow:"hidden", width:"100%", marginBottom:5 }}>
                                    <div style={{ display:"flex", height:"100%", width:`${barWidth}%`, transition:"width 0.5s" }}>
                                      {counts.map((e, i) => (
                                        <div key={e.emoji} style={{ width:`${(e.count/total)*100}%`, background:shades[i%shades.length], display:"flex", alignItems:"center", justifyContent:"center" }}>
                                          {(e.count/total) > 0.15 && <span style={{ fontSize:12 }}>{e.emoji}</span>}
                                        </div>
                                      ))}
                                    </div>
                                  </div>
                                  {/* Legenda su una riga */}
                                  <div style={{ display:"flex", flexWrap:"nowrap", gap:4, overflowX:"auto" }}>
                                    {counts.map((e, i) => (
                                      <span key={e.emoji} style={{ ...f, fontSize:10, display:"flex", alignItems:"center", gap:2, whiteSpace:"nowrap" }}>
                                        <span style={{ width:8, height:8, borderRadius:2, background:shades[i%shades.length], display:"inline-block", flexShrink:0 }} />
                                        <span style={{ color:"#999" }}>{e.emoji} {e.count}</span>
                                      </span>
                                    ))}
                                  </div>
                                </>
                              )}
                            </div>
                          );
                        })}
                      </>
                    );
                  })()}
                </div>

                {/* Durata cicli — trimestrali */}
                <div style={card}>
                  <div style={cardT}>📅 Durata cicli</div>
                  <div style={{ ...f, fontSize:13, color:"#888", marginBottom:14 }}>
                    Media: <span style={{ fontWeight:"800", color:"#e07b8a", fontSize:16 }}>{cycleLen} giorni</span>
                  </div>
                  {(() => {
                    const reversed = [...sortedCycles].reverse();
                    const totalPages = Math.ceil(reversed.length / 3);
                    const pageIdx = Math.min(cyclePageIdx, totalPages - 1);
                    const pageCycles = reversed.slice(pageIdx * 3, pageIdx * 3 + 3);

                    return (
                      <>
                        {/* Nav trimestre */}
                        {totalPages > 1 && (
                          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                            <button onClick={() => setCyclePageIdx(Math.max(0, pageIdx-1))}
                              style={{ ...navBtn, padding:"6px 14px", fontSize:16, opacity:pageIdx===0?0.3:1 }}>‹</button>
                            <span style={{ ...f, fontSize:13, color:"#aaa", fontWeight:"700" }}>
                              {pageIdx * 3 + 1}–{Math.min(pageIdx * 3 + 3, reversed.length)} di {reversed.length} cicli
                            </span>
                            <button onClick={() => setCyclePageIdx(Math.min(totalPages-1, pageIdx+1))}
                              style={{ ...navBtn, padding:"6px 14px", fontSize:16, opacity:pageIdx===totalPages-1?0.3:1 }}>›</button>
                          </div>
                        )}

                        {pageCycles.map((cycle, i) => {
                          const globalIdx = sortedCycles.indexOf(cycle);
                          const nextCycle = sortedCycles[globalIdx + 1];
                          const cycleDur = nextCycle ? diffDays(cycle.start, nextCycle.start) : null;
                          const mensDur = cycle.mensDuration || 5;
                          const totalDays = cycleDur || 28;
                          const startLabel = new Date(cycle.start+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short"});
                          const endLabel = nextCycle
                            ? new Date(nextCycle.start+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short"})
                            : cycle.end ? new Date(cycle.end+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short"}) : "in corso";

                          const segments = Math.min(totalDays, 35);
                          const segmentDays = Array.from({length: segments}, (_, d) => {
                            if (d < mensDur) return DEFAULT_PHASES[0].color;
                            if (d < 13)      return DEFAULT_PHASES[1].color;
                            if (d < 17)      return DEFAULT_PHASES[2].color;
                            return DEFAULT_PHASES[3].color;
                          });

                          return (
                            <div key={i} style={{ marginBottom:16, paddingBottom:16, borderBottom: i < pageCycles.length-1 ? "1px solid #f0e8e0" : "none" }}>
                              <div style={{ ...f, fontWeight:"800", fontSize:14, color:"#2d1f1f", marginBottom:6 }}>
                                {startLabel} → {endLabel}
                              </div>
                              <div style={{ display:"flex", gap:2, marginBottom:6, overflow:"hidden" }}>
                                {segmentDays.map((color, d) => (
                                  <div key={d} style={{ flex:1, height:10, borderRadius:3, background:color, opacity:0.85, minWidth:0 }} />
                                ))}
                              </div>
                              <div style={{ ...f, fontSize:12, color:"#aaa" }}>
                                {mensDur} giorni mestruazioni{cycleDur ? ` · ${cycleDur} giorni ciclo` : ""}
                              </div>
                            </div>
                          );
                        })}
                      </>
                    );
                  })()}
                </div>

                {/* Pattern sintomi */}
                <div style={card}>
                  <div style={cardT}>🩺 Pattern sintomi</div>
                  {(() => {
                    // Conta giorni totali per fase e sintomi per fase
                    const phaseSymptoms = {};
                    const phaseDays = {};
                    DEFAULT_PHASES.forEach(p => { phaseSymptoms[p.name] = {}; phaseDays[p.name] = 0; });

                    Object.entries(data.logs).forEach(([date, log]) => {
                      const phase = getPhaseForDate(date, data.cycles);
                      if (!phase) return;
                      phaseDays[phase.name]++;
                      (log.symptoms||[]).forEach(s => {
                        phaseSymptoms[phase.name][s] = (phaseSymptoms[phase.name][s]||0) + 1;
                      });
                    });

                    // Trova pattern significativi (sintomo presente in >40% dei giorni di quella fase)
                    const patterns = [];
                    DEFAULT_PHASES.forEach(phase => {
                      const days = phaseDays[phase.name];
                      if (days < 2) return;
                      Object.entries(phaseSymptoms[phase.name])
                        .sort((a,b) => b[1]-a[1])
                        .forEach(([symptom, count]) => {
                          const pct = Math.round((count/days)*100);
                          if (pct >= 40) patterns.push({ phase, symptom, count, pct });
                        });
                    });

                    // Tutti i sintomi per fase (anche quelli < 40%) per la lista completa
                    const hasAnyData = Object.values(phaseDays).some(d => d > 0);

                    if (!hasAnyData) return <div style={{ ...f, fontSize:12, color:"#ccc" }}>Nessun dato ancora — inizia a segnare i sintomi!</div>;

                    return (
                      <>
                        {/* Pattern evidenti */}
                        {patterns.length > 0 && (
                          <div style={{ marginBottom:16 }}>
                            <div style={{ ...f, fontSize:12, color:"#aaa", fontWeight:"700", marginBottom:8 }}>✨ Pattern rilevati</div>
                            {patterns.map(({phase, symptom, count, pct}, i) => (
                              <div key={i} style={{ background:phase.bg, borderRadius:12, padding:"10px 12px", marginBottom:8, border:`1.5px solid ${phase.color}50`, display:"flex", alignItems:"center", gap:10 }}>
                                <div style={{ flex:1 }}>
                                  <div style={{ ...f, fontSize:13, fontWeight:"800", color:phase.color }}>{symptom}</div>
                                  <div style={{ ...f, fontSize:11, color:"#888" }}>
                                    Fase {phase.name} · {count} volt{count===1?"a":"e"}
                                  </div>
                                </div>
                                <div style={{ ...f, fontSize:18, fontWeight:"800", color:phase.color }}>{pct}%</div>
                              </div>
                            ))}
                          </div>
                        )}

                        {/* Dettaglio per fase */}
                        <div style={{ ...f, fontSize:12, color:"#aaa", fontWeight:"700", marginBottom:8 }}>📊 Dettaglio per fase</div>
                        {DEFAULT_PHASES.map(phase => {
                          const days = phaseDays[phase.name];
                          const syms = Object.entries(phaseSymptoms[phase.name]).sort((a,b)=>b[1]-a[1]).slice(0,4);
                          return (
                            <div key={phase.name} style={{ marginBottom:14 }}>
                              <div style={{ ...f, fontSize:13, fontWeight:"800", color:phase.color, marginBottom:6 }}>{phase.emoji} {phase.name}</div>
                              {syms.length === 0 ? (
                                <div style={{ ...f, fontSize:11, color:"#ccc" }}>nessun sintomo registrato</div>
                              ) : syms.map(([s, count]) => {
                                const pct = Math.round((count/(days||1))*100);
                                return (
                                  <div key={s} style={{ marginBottom:6 }}>
                                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                                      <span style={{ ...f, fontSize:12, color:"#555" }}>{s}</span>
                                      <span style={{ ...f, fontSize:11, color:phase.color, fontWeight:"800" }}>{pct}% · {count}×</span>
                                    </div>
                                    <div style={{ background:"#f5f0eb", borderRadius:20, height:6, overflow:"hidden" }}>
                                      <div style={{ width:`${pct}%`, height:"100%", background:phase.color, borderRadius:20, opacity:0.75 }} />
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })}
                      </>
                    );
                  })()}
                </div>
              </>
            )}

            {/* Backup & Ripristino */}
            <div style={{ ...card, marginTop:8 }}>
              <div style={cardT}>💾 Backup & Ripristino</div>
              <div style={{ ...f, fontSize:13, color:"#aaa", marginBottom:12 }}>Salva i tuoi dati o ripristinali da un backup precedente.</div>
              <div style={{ display:"flex", gap:10 }}>
                <button onClick={() => {
                  const dataStr = JSON.stringify(data, null, 2);
                  const blob = new Blob([dataStr], {type:"application/json"});
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement("a");
                  a.href = url;
                  a.download = "lunathina-backup-" + new Date().toISOString().slice(0,10) + ".json";
                  a.click();
                  URL.revokeObjectURL(url);
                }} style={{ ...f, flex:1, padding:"12px 8px", borderRadius:12, background:"#e07b8a", color:"#fff", border:"none", fontWeight:"800", fontSize:13, cursor:"pointer", textAlign:"center" }}>
                  📤 Esporta
                </button>
                <label style={{ flex:1, padding:"12px 8px", borderRadius:12, background:"#f5f0ff", color:"#8b5cf6", border:"2px solid #8b5cf6", fontWeight:"800", fontSize:13, cursor:"pointer", textAlign:"center", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Nunito',sans-serif" }}>
                  📥 Importa
                  <input type="file" accept=".json" style={{ display:"none" }} onChange={(e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                      try {
                        const imported = JSON.parse(ev.target.result);
                        if (imported.cycles && imported.logs) {
                          setData(imported);
                          alert("✅ Dati importati con successo!");
                        } else {
                          alert("❌ File non valido.");
                        }
                      } catch(err) {
                        alert("❌ Errore nella lettura del file.");
                      }
                    };
                    reader.readAsText(file);
                  }} />
                </label>
              </div>
            </div>

            {/* Download Diario & CSV */}
            <div style={{ ...card, marginTop:8 }}>
              <div style={cardT}>📥 Scarica i tuoi dati</div>
              <div style={{ ...f, fontSize:13, color:"#aaa", marginBottom:14 }}>Scarica il diario o tutti i dati in formato CSV per Excel.</div>
              <button onClick={() => {
                const lines = ["📓 DIARIO LUNATHINA", "═══════════════════════════", ""];
                const dates = Object.keys(data.logs).sort();
                dates.forEach(date => {
                  const log = data.logs[date];
                  const notes = (log.notes || (log.note ? [log.note] : [])).filter(n => n && n.trim());
                  if (notes.length === 0) return;
                  const d = new Date(date+"T12:00:00");
                  const label = d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
                  const phase = getPhaseForDate(date, data.cycles);
                  lines.push("📅 " + label + (phase ? " · " + phase.name : ""));
                  notes.forEach(n => lines.push("   " + n));
                  lines.push("");
                });
                if (lines.length <= 3) { alert("Nessuna nota da scaricare!"); return; }
                const blob = new Blob([lines.join("\n")], {type:"text/plain;charset=utf-8"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "lunathina-diario-" + new Date().toISOString().slice(0,10) + ".txt";
                a.click();
                URL.revokeObjectURL(url);
              }} style={{ ...f, width:"100%", padding:"12px", borderRadius:12, background:"#fdf0f2", color:"#e07b8a", border:"2px solid #e07b8a", fontWeight:"800", fontSize:14, cursor:"pointer", marginBottom:10 }}>
                📓 Scarica Diario (.txt)
              </button>
              <button onClick={() => {
                const rows = [["Data","Fase","Giorno ciclo","Umore","Allenamenti","Sintomi","Note"]];
                Object.keys(data.logs).sort().forEach(date => {
                  const log = data.logs[date];
                  const phase = getPhaseForDate(date, data.cycles);
                  const docNum = getDayOfCycle(date, data.cycles);
                  const allMoods = [...(log.moods||[]), ...(log.mood ? [log.mood] : [])];
                  const notes = (log.notes || (log.note ? [log.note] : []));
                  rows.push([date, (phase&&phase.name)||"", docNum||"", allMoods.join(" "), (log.workouts||[]).join(" | "), (log.symptoms||[]).join(" | "), notes.join(" | ").replace(/\n/g," ")]);
                });
                const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
                const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "lunathina-dati-" + new Date().toISOString().slice(0,10) + ".csv";
                a.click();
                URL.revokeObjectURL(url);
              }} style={{ ...f, width:"100%", padding:"12px", borderRadius:12, background:"#f0faf9", color:"#2a9d8f", border:"2px solid #2a9d8f", fontWeight:"800", fontSize:14, cursor:"pointer" }}>
                📊 Scarica dati CSV (Excel)
              </button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  
  </script>
</body>
</html>
